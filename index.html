<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cal Tracker</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <section id="main" class = "panel">
      <section id="app-name">
        <h1>Cal Tracker</h1>
        <p id="date"></p>
      </section>

      <!--Calories-->
      <section id="calorie-section">
        <h2>Overview</h2>
        <div id = "calories-display">
          Calories: <span id="calories-consumed">0</span>  /
          <span id= "calories-goal">2000</span>
        </div>
        
        <div id= "progress-bar-container">
          <div id= "calorie-bar-fill" class = "bar-fill"></div>
        </div>
      </section>

      <!--Macros-->
      <section id="macro-section">
        <div class = "macros-display">
          <!--Fats-->
          <div class="macro">
            <span class="macro-label">Fats:</span>
            <span class="macro-value" id = "fat-consumed">0</span> /
            <span class="macro-goal" id="fat-goal">50</span>
          </div>
          <div class ="macro-bar-container">
            <div class ="bar-fill" id="fat-bar-fill"></div>
          </div>
           <!--Carbs-->
          <div class="macro">
            <span class="macro-label">Carbs:</span>
            <span class="macro-value" id = "carb-consumed">0</span> /
            <span class="macro-goal" id="carb-goal">50</span>
          </div>
          <div class ="macro-bar-container">
            <div class = "bar-fill" id="carb-bar-fill"></div>
          </div>
           <!--Protein-->
          <div class="macro">
            <span class="macro-label">Protein:</span>
            <span class="macro-value" id = "protein-consumed">0</span> /
            <span class="macro-goal" id="protein-goal">50</span>
          </div>
          <div class ="macro-bar-container">
            <div class = "bar-fill" id="protein-bar-fill"></div>
          </div>
        </div>
      </section>
      <div class="hidden" id="meal-summary-overlay">
        <div id="meal-buttons">
          <button id="cancel-meal" class="meal-overlay-btn">Cancel</button>
          <button id="save-meal" class = "meal-overlay-btn">Save</button>
        </div>
        <div id="meal-macro-summary">
          <span> Calories: <span id="calorie-meal">0</span>kcal</span>
          <span> Fats: <span id="fat-meal">0</span>g </span>
          <span> Carbs: <span id="carb-meal">0</span>g </span>
          <span> Protein: <span id="protein-meal">0</span>g </span>
        </div>

      </div>

      <button id ="options-button">Options</button>
      
    </section>
    <!--Options Window-->
    <section id="options-window" class="window">
        <h2>Settings</h2>
        <!--Change user Macro goals-->
        <div class="set-row">
          <div class="set-name">Calories</div>
          <div><input id="set-calories" class="set-input" type="number" min="0"></div>
          <div class="set-info">kcal/ day</div>
        </div>

        <div class="set-row">
          <div class="set-name">Fat</div>
          <div><input id="set-fats" class="set-input" type="number" min="0"></div>
          <div class="set-info">grams / day</div>
        </div>

        <div class="set-row">
          <div class="set-name">Carbs</div>
          <div><input id="set-carbs" class="set-input" type="number" min="0"></div>
          <div class="set-info">grams / day</div>
        </div>

        <div class="set-row">
          <div class="set-name">Protein</div>
          <div><input id="set-protein" class="set-input" type="number" min="0"></div>
          <div class="set-info">grams / day</div>
        </div>
        
        <div id="goal-option-buttons">
          <button id="cancel-goals" class="overlay-btn">Cancel</button>
          <button id="save-goals" class = "overlay-btn">Save</button>
        </div>
    </section>
    <!--Meal Section-->
    <section id = "meal" class = "panel">
      <div class= "meal-section">
        <h3><button id = "log-meal">Log a Meal</button></h3>
      </div>
    </section>

      <!--Add meal window pop up Initially Hidden-->
      <div class="hidden" id="add-meal-container">
          <input type="text" id="meal-name" placeholder="Enter Meal Name" class ="user-input">
        </div>
      </div>
    </section>
    
    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
