server {
    listen 80;
    server_name localhost;

    # 1. Front end
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Consolidated Backend Proxies
    # This matches: /auth/, /consumed/, /food-list/, /goals/, /meals/, /ai/, and /sync/
    location ~ ^/(auth|consumed|food-list|goals|meals|ai|sync)/ {
        proxy_pass http://api:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CLOUDFLARE SPECIFIC: Explicitly forwards Cloudflare's real user IP; THIS IS USED FOR LIMITING REGISTER ACCOUNTS
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; 
    }

    # Error handling fallback
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}